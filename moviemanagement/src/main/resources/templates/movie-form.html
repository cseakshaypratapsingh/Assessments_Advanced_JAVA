<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movie Form</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm mx-auto" style="max-width: 600px;">
        <div class="card-body">

            <h3 class="mb-4 text-center fw-bold">
                <span th:text="${movie.id == null ? 'Add Movie' : 'Edit Movie'}"></span>
            </h3>

            <form th:action="@{/movies}" th:object="${movie}" method="post">

                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control"
                           th:field="*{title}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Genre</label>
                    <input type="text" class="form-control"
                           th:field="*{genre}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Director</label>
                    <input type="text" class="form-control"
                           th:field="*{director}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Release Year</label>
                    <input type="number" class="form-control"
                           th:field="*{releaseYear}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Rating (0 - 10)</label>
                    <input type="number" step="0.1" min="0" max="10"
                           class="form-control"
                           th:field="*{rating}" required>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/movies}" class="btn btn-secondary">
                        Back
                    </a>

                    <button type="submit" class="btn btn-success">
                        Save Movie
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
