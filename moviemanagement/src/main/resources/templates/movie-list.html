<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movie Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
          rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6f9;
        }

        .hero {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            color: white;
            padding: 40px;
            border-radius: 12px;
        }

        .movie-card {
            border-radius: 12px;
            transition: transform 0.2s ease;
        }

        .movie-card:hover {
            transform: translateY(-3px);
        }

        .rating-badge {
            font-size: 0.9rem;
            padding: 6px 10px;
            border-radius: 50px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold">Movie Management</span>
    </div>
</nav>

<div class="container mt-5">

    <div class="hero mb-4 shadow-sm">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-1">Movie Dashboard</h2>
                <p class="mb-0">Manage your catalog efficiently and beautifully.</p>
            </div>
            <a th:href="@{/movies/new}" class="btn btn-light fw-semibold">
                + Add Movie
            </a>
        </div>
    </div>

    <div class="row g-4" th:if="${!#lists.isEmpty(movies)}">

        <div class="col-md-6 col-lg-4"
             th:each="movie : ${movies}">

            <div class="card movie-card shadow-sm h-100">
                <div class="card-body d-flex flex-column">

                    <h5 class="fw-bold mb-2"
                        th:text="${movie.title}"></h5>

                    <p class="text-muted mb-1">
                        <strong>Genre:</strong>
                        <span th:text="${movie.genre}"></span>
                    </p>

                    <p class="text-muted mb-1">
                        <strong>Director:</strong>
                        <span th:text="${movie.director}"></span>
                    </p>

                    <p class="text-muted mb-3">
                        <strong>Year:</strong>
                        <span th:text="${movie.releaseYear}"></span>
                    </p>

                    <div class="mt-auto d-flex justify-content-between align-items-center">

                        <span class="badge bg-success rating-badge"
                              th:text="${movie.rating + ' ★'}"></span>

                        <div>
                            <a th:href="@{/movies/edit/{id}(id=${movie.id})}"
                               class="btn btn-sm btn-outline-primary me-2">
                                Edit
                            </a>

                            <a th:href="@{/movies/delete/{id}(id=${movie.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Delete this movie?')">
                                Delete
                            </a>
                        </div>

                    </div>

                </div>
            </div>

        </div>

    </div>

    <div th:if="${#lists.isEmpty(movies)}"
         class="text-center mt-5 text-muted">
        <h5>No movies available.</h5>
        <p>Start building your collection.</p>
    </div>

</div>

</body>
</html>
